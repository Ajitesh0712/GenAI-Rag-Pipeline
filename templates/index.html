<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

        <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Local RAG Assistant</title>

    <link
        rel="preconnect"
        href="https://fonts.googleapis.com">

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link
        rel="stylesheet"
        href="/static/styles.css?v=10">

</head>

<body>

<div class="app">

    <!-- SIDEBAR -->

    <aside class="sidebar">

        <div class="sidebar-header">

            <hr>

            <h6 class="sidebar-heading mt-3">

                Chats

            </h6>

            <div id="chatList">

            </div>

            <button
                id="newChatBtn"
                class="btn btn-primary w-100 mt-3">

                + New Chat

            </button>

        </div>

        <div
            id="documentsList"
            class="documents-list">

        </div>

        <div class="upload-panel">

            <div class="upload-panel">

                <label class="section-label">

                    <h5>Upload File</h5>

                </label>

                <input
                    type="file"
                    id="fileInput"
                    class="form-control mb-3">


            </div>
            <br>
            <hr>
            <br>

                <h5>Import Website</h5>

                <input
                    type="text"
                    id="urlInput"
                    class="form-control"
                    placeholder="https://example.com">

                <button
                    class="upload-btn mt-3"
                    onclick="uploadURL()">

                    Import Website

                </button>
            <div id="selectedFile" class="selected-file">

                No file selected

            </div>

            <button

                class="upload-btn"

                onclick="window.uploadDocument()">

                Upload & Index

            </button>

            <div
                id="uploadStatus"
                class="upload-status">

            </div>

        </div>

    </aside>



    <!-- MAIN -->

    <main class="main">

        <div class="chat-header">

            <div>

                <h2>

                    Conversation

                </h2>
                <button
                    id="newChatBtn"
                    class="new-chat-btn">

                    <i class="bi bi-plus-lg"></i>

                    New Chat

                </button>

                <p>

                    Ask questions about your uploaded documents

                </p>

            </div>

        </div>

        <div
            id="chatBox"
            class="chat-area">

        </div>

        <div class="input-area">

            <textarea id="messageInput" placeholder="Ask anything..."></textarea>

            <button

                class="send-btn"

                onclick="sendMessage()">

                <i class="bi bi-send-fill"></i>

            </button>

        </div>

    </main>

</div>





<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<script src="/static/app.js?v=10"></script>

</body>

</html>
