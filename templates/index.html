<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

        <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Local RAG Assistant</title>

    <link
        rel="preconnect"
        href="https://fonts.googleapis.com">

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link
        rel="stylesheet"
        href="/static/styles.css?v=10">

</head>

<body>

<div class="app">

    <!-- SIDEBAR -->

    <aside class="sidebar">

        <div class="sidebar-header">

            <h3 class="logo">

                RAG Assistant

            </h3>
            <button
                    id="newChatBtn"
                    class="sidebar-btn primary">

                    <i class="bi bi-plus-lg"></i>

                    New Chat

            </button>

        </div>


        <div class="sidebar-section">

            <h2 class="sidebar-heading">

                Chats

            </h2>

            <div id="chatList"></div>

        </div>

        <div class="sidebar-section">

    <h6
        id="knowledgeHeader"
        class="sidebar-heading collapsible">

        <i
            id="knowledgeArrow"
            class="bi bi-chevron-right">
        </i>

        Knowledge Base

        <span id="knowledgeCount">

            (0)

        </span>

    </h6>

    <div
        id="documentsList"
        class="documents-list"
        style="display:block;">

    </div>

    <button
        id="addKnowledgeBtn"
        class="sidebar-btn secondary">

        <i class="bi bi-database-fill-add"></i>

        Add Knowledge

    </button>

</div>

    </aside>



    <!-- MAIN -->

    <main class="main">

        <div class="chat-header">

            <div>

                <h2>

                    Conversation

                </h2>
                

                <p>

                    Ask questions about your uploaded documents

                </p>

            </div>

        </div>

        <div
            id="chatBox"
            class="chat-area">

        </div>

        <div class="input-area">

            <textarea id="messageInput" placeholder="Ask anything..."></textarea>

            <button

                class="send-btn"

                onclick="sendMessage()">

                <i class="bi bi-send-fill"></i>

            </button>

        </div>

    </main>

</div>



<div id="knowledgeModal" class="modal">

    <div class="modal-content">

        <span id="closeModal" class="close-btn">

            &times;

        </span>

        <h2>

            Add Knowledge

        </h2>

        <hr>

        <h5>

            Upload File

        </h5>

        <input
            type="file"
            id="fileInput"
            class="form-control">

        <div id="selectedFile"
            class="selected-file">

            No file selected

        </div>

        <button
            class="upload-btn"
            onclick="window.uploadDocument()">

            Upload & Index

        </button>

        <hr>

        <h5>

            Import Website

        </h5>

        <input
            type="text"
            id="urlInput"
            class="form-control"
            placeholder="https://example.com">

        <button
            class="upload-btn"
            onclick="window.uploadURL()">

            Import Website

        </button>

        <div
            id="uploadStatus"
            class="upload-status">

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<script src="/static/app.js?v=10"></script>

</body>

</html>
