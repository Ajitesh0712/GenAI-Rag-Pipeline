<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

        <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Local RAG Assistant</title>

    <link
        rel="preconnect"
        href="https://fonts.googleapis.com">

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link
        rel="stylesheet"
        href="/static/styles.css?v=10">

</head>

<body>

<div class="app">

    <!-- SIDEBAR -->

    <aside class="sidebar">

        <div class="sidebar-header">

            <h2>

                <i class="bi bi-journal-richtext"></i>

                Knowledge Base

            </h2>

        </div>

        <div
            id="documentsList"
            class="documents-list">

        </div>

        <div class="upload-panel">

            <label
                class="upload-box">

                <i
                    class="bi bi-cloud-arrow-up-fill"></i>

                <span>

                    Upload Document

                </span>

                <small>

                    PDF • DOCX • TXT

                </small>

                <input
                    type="file"
                    id="fileInput"
                    hidden>

            </label>
            <div id="selectedFile" class="selected-file">

                No file selected

            </div>

            <button

                class="upload-btn"

                onclick="window.uploadDocument()">

                Upload & Index

            </button>

            <div
                id="uploadStatus"
                class="upload-status">

            </div>

        </div>

    </aside>



    <!-- MAIN -->

    <main class="main">

        <div class="chat-header">

            <div>

                <h2>

                    Conversation

                </h2>

                <p>

                    Ask questions about your uploaded documents

                </p>

            </div>

        </div>

        <div
            id="chatBox"
            class="chat-area">

        </div>

        <div class="input-area">

            <textarea id="messageInput" placeholder="Ask anything..."></textarea>

            <button

                class="send-btn"

                onclick="sendMessage()">

                <i class="bi bi-send-fill"></i>

            </button>

        </div>

    </main>

</div>





<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<script src="/static/app.js?v=10"></script>

</body>

</html>
